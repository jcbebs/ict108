
<style>
*{box-sizing:border-box;margin:0;padding:0}
.header{margin-bottom:1.5rem}
.header h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.header p{font-size:14px;color:var(--color-text-secondary)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.tab{padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.quiz-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#178BCA;border-radius:2px;transition:width 0.3s}
.q-meta{font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px}
.q-text{font-size:15px;color:var(--color-text-primary);margin-bottom:1.25rem;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.opt{padding:10px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;color:var(--color-text-primary);background:var(--color-background-primary);text-align:left;transition:all 0.15s;line-height:1.5}
.opt:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.opt.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.opt.reveal{background:#EAF3DE;border-color:#639922;color:#27500A}
.feedback{font-size:13px;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:1.25rem;line-height:1.5}
.feedback.correct{background:#EAF3DE;color:#27500A;border:0.5px solid #639922}
.feedback.wrong{background:#FCEBEB;color:#501313;border:0.5px solid #A32D2D}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.btn{padding:8px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#178BCA;border-color:#178BCA;color:#fff}
.btn.primary:hover{background:#1278B0}
.score-card{text-align:center;padding:2rem 1rem}
.score-big{font-size:48px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.score-label{font-size:16px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.score-metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.score-metric .num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.score-metric .lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
</style>
<h2 class="sr-only">IT108 Cybersecurity Quiz — 3 topic modules with 30+ questions each</h2>
<div id="app" style="padding:1rem 0"></div>
<script>
const MODULES = [
  {
    id:'phishing_scenarios',
    title:'Phishing Scenario Quiz',
    desc:'Safe or phishing? Real-world scenario identification',
    questions:[
      {q:'An automated robocall from the "IRS" claims there is a warrant out for your arrest due to tax fraud, unless you buy prepaid debit cards immediately. What is this?',opts:['SAFE — government agencies do contact people this way','PHISHING — government agencies never demand prepaid debit cards or threaten arrest via robocall','SAFE — robocalls are always legitimate','PHISHING — only if it asks for a credit card'],ans:1,exp:'This is Vishing (voice phishing). Legitimate government agencies like the IRS never demand payment via prepaid debit cards or threaten immediate arrest through robocalls.'},
      {q:'A vendor you\'ve been emailing all week sends a Google Docs link. You open it and it asks you to type your corporate email password to view the file. What is this?',opts:['SAFE — you know the vendor','PHISHING — legitimate Google Docs links never ask for your password to view a file','SAFE — Google Docs always asks for credentials','PHISHING — only if it uses a fake domain'],ans:1,exp:'This is Phishing. Legitimate Google Docs links never require you to type your corporate password into a generic box. The vendor\'s account was likely compromised.'},
      {q:'A new user named "IT Helpdesk_Bot" joins your workspace and DMs you: "Security patch required. Please send your current password to verify identity." What is this?',opts:['SAFE — IT bots commonly ask for passwords','PHISHING — legitimate IT departments never ask for your current password','SAFE — if your company uses Slack/Teams','PHISHING — only if the bot has a suspicious name'],ans:1,exp:'This is Phishing (via a messaging platform). No legitimate IT department will ever ask you to send your current password to verify your identity.'},
      {q:'Your phone receives 15 consecutive MFA push notifications to approve a corporate login. A minute later, "IT" calls and says: "Sorry about the glitch, just hit approve to clear the queue." What is this?',opts:['SAFE — IT sometimes sends multiple push notifications','PHISHING — this is an MFA Fatigue attack designed to trick you into approving a fraudulent login','SAFE — approving clears the notifications','PHISHING — only if they ask for a password'],ans:1,exp:'This is an MFA Fatigue attack — a Vishing technique. The attacker floods your phone with MFA requests hoping you\'ll give in, then calls to socially engineer your approval. Never approve MFA prompts you didn\'t initiate.'},
      {q:'You ordered shoes yesterday. Today you get a text tracking update from a generic 10-digit number with a link to the official USPS.com website. What is this?',opts:['SAFE — the link goes to the official USPS website','PHISHING — all SMS tracking links are dangerous','SAFE — you did order something recently','PHISHING — the number is suspicious but the link is fine'],ans:0,exp:'This is SAFE. The key indicator is the link goes to the official USPS website (usps.com), not a lookalike domain. The context also matches — you actually ordered shoes.'},
      {q:'You receive a suspicious wire transfer request via email from a vendor. Instead of replying, you look up the vendor\'s phone number from your official contract files and call them directly. What is this?',opts:['PHISHING — you should always reply to the email','SAFE — this is the correct verification method: using a known, independent contact method','SAFE — only if the wire transfer is small','PHISHING — calling vendors is not standard practice'],ans:1,exp:'This is the SAFE and CORRECT action. Using a known, independent contact channel (like calling the number from your own records) to verify a suspicious request is exactly the right defense strategy.'},
      {q:'Someone calls claiming to be from "Microsoft Windows Support," saying your computer is sending error logs and they need remote access via AnyDesk to fix it. What is this?',opts:['SAFE — Microsoft does proactively contact users','PHISHING (Vishing) — Microsoft does not make unsolicited calls to fix your computer','SAFE — if they use AnyDesk it is legitimate','PHISHING — only if they ask for payment'],ans:1,exp:'This is Vishing. Microsoft does not make unsolicited calls to report your computer\'s errors. Granting remote access would give the attacker full control of your machine.'},
      {q:'Your company\'s IT department sends an email announcing a mandatory VPN client update with a link to the company\'s internal software portal. What is this?',opts:['PHISHING — any link in an email is dangerous','SAFE — the link goes to the company\'s own internal portal','PHISHING — IT never sends update emails','SAFE — only if you verify the email address first'],ans:1,exp:'This is SAFE. The email is from the company\'s own IT department and links to the company\'s own internal portal — not an external or lookalike site.'},
      {q:'You scan a QR code sticker on a physical city parking meter. The URL it opens is "cityparkingsecure.xyz" and it demands your full credit card details. What is this?',opts:['SAFE — .xyz domains are used by cities','PHISHING (Quishing) — the suspicious .xyz domain and QR sticker on public infrastructure are major red flags','SAFE — parking meters need payment','PHISHING — only if the site looks amateur'],ans:1,exp:'This is Phishing via a QR code (called "Quishing"). The .xyz domain and the fact that it\'s a sticker pasted over the original are major red flags. Official city payment portals use official government domains.'},
      {q:'A LinkedIn recruiter offers a remote job paying double your salary and insists you download an application form called "Job_Description.exe" to apply. What is this?',opts:['SAFE — recruiters often send files','PHISHING — a .exe file disguised as a document is a malware delivery method','SAFE — if the recruiter profile looks real','PHISHING — only if they ask for payment upfront'],ans:1,exp:'This is Phishing. A .exe file (executable) disguised as a job application document is a classic malware delivery method. No legitimate recruiter sends executable files as application forms.'},
      {q:'Which psychological trigger does the message "Only 2 hours left to claim your prize" use?',opts:['Exclusivity','Authority','Scarcity','Loss/Fear'],ans:2,exp:'This uses Scarcity — creating a time limit to pressure the victim into acting before they can think critically.'},
      {q:'Which psychological trigger does "A special offer just for you" use?',opts:['Scarcity','Exclusivity','Authority','Loss/Fear'],ans:1,exp:'This uses Exclusivity — making the target feel specially chosen to lower their guard.'},
      {q:'Which psychological trigger does "This is the IT Department; we need your password for an audit" use?',opts:['Scarcity','Loss/Fear','Exclusivity','Authority'],ans:3,exp:'This uses Authority — impersonating a figure of authority (IT Department) to compel compliance.'},
      {q:'Which psychological trigger does "Your account will be suspended if you don\'t act now" use?',opts:['Exclusivity','Scarcity','Authority','Loss/Fear'],ans:3,exp:'This uses Loss/Fear — threatening a negative consequence (account suspension) to create panic and rushed action.'},
      {q:'What is the acronym that summarizes the four psychological triggers used in social engineering attacks?',opts:['FEAR','SEAL','HACK','TRAP'],ans:1,exp:'SEAL stands for Scarcity, Exclusivity, Authority, and Loss/Fear — the four core psychological triggers used in social engineering.'},
      {q:'In the "Urgent Security Audit" scenario, what was Phase 1 of the attack?',opts:['A phishing email with a malicious link','A vishing call from "IT Security"','A smishing text claiming unusual login activity in Iloilo City','A fake LinkedIn job offer'],ans:2,exp:'Phase 1 was The Smish — a text message claiming unusual login activity detected in Iloilo City, designed to trigger fear and urgency.'},
      {q:'In the scenario, the employee hit "Deny" on the first MFA prompt. What did the attacker do next?',opts:['Gave up the attack','Sent another phishing email','Called the employee pretending to be IT Security to trick them into approving','Tried a different employee'],ans:2,exp:'The attacker escalated to a Vishing call, using the information from the smish and the employee\'s own Deny action as "social proof" to build trust and manipulate approval.'},
      {q:'Why did the employee trust the "IT" caller in the scenario?',opts:['The caller knew the company\'s internal phone extension','The caller demonstrated knowledge of the Iloilo login and the Deny action — social proof','The caller had the employee\'s full name','The caller used official company email'],ans:1,exp:'The attacker used Social Proof — they referenced specific details (the Iloilo city location and the fact the employee had just hit Deny) that made the caller seem legitimate and informed.'},
      {q:'What is a key red flag in the smishing URL "https://it-support-portal.net/verify"?',opts:['It uses HTTPS','It contains the word "verify"','The domain is not the company\'s official domain','It has a hyphen in the URL'],ans:2,exp:'The URL uses a third-party domain (it-support-portal.net) instead of the company\'s own official domain. Real IT portals use the company\'s own domain.'},
      {q:'According to the defense strategies, what is described as "the single best defense" against phishing?',opts:['Antivirus software','Spam filters','Multi-Factor Authentication (MFA)','Employee training'],ans:2,exp:'MFA (Multi-Factor Authentication) is described as the single best defense. Even if attackers steal your password, they can\'t get the second authentication code.'},
      {q:'Why is smishing considered particularly dangerous compared to phishing emails?',opts:['SMS messages are always encrypted','Mobile browsers often hide the full URL, making it harder to spot fake websites','People read texts faster','SMS cannot be filtered by spam tools'],ans:1,exp:'Smishing is dangerous because mobile browsers often hide the full URL, making it much harder for users to inspect and spot a fake lookalike website.'},
      {q:'What technique does Vishing often use to appear as a trusted local number?',opts:['Domain spoofing','IP masking','Caller ID Spoofing','VPN tunneling'],ans:2,exp:'Vishing leverages Caller ID Spoofing to make the incoming call appear to come from a trusted or local number, increasing the likelihood of the target picking up.'},
      {q:'What is "Spear Phishing"?',opts:['Mass phishing emails sent to thousands','Phishing targeting high-level executives specifically','Phishing targeting a specific individual or organization','Phishing via SMS'],ans:2,exp:'Spear Phishing is targeted phishing aimed at a specific individual (like an IT teacher) rather than a mass audience. It is more personalized and therefore more convincing.'},
      {q:'What is "Whaling"?',opts:['Phishing attacks involving large file attachments','Spear phishing specifically targeting high-level executives','Phishing using whale-themed lures','Mass phishing via email'],ans:1,exp:'Whaling is a form of Spear Phishing that specifically targets high-level executives (CEOs, CFOs) — the "big fish" or "whales" of an organization.'},
      {q:'What does "hovering" over a link in an email help you detect?',opts:['Whether the email has attachments','The sender\'s IP address','The actual destination URL before you click','Whether the email is encrypted'],ans:2,exp:'Hovering over a link reveals its actual destination URL in your browser\'s status bar, allowing you to check if it matches the expected legitimate website before clicking.'},
      {q:'Smishing messages commonly mimic which two types of organizations?',opts:['Tech companies and airlines','Banks and package delivery services','Hospitals and schools','Government offices and insurance companies'],ans:1,exp:'Smishing commonly mimics bank alerts (e.g., "unusual transaction detected") and package delivery failures (e.g., "your package could not be delivered") to trigger urgency.'},
      {q:'What does "spoofed domain" mean in the context of phishing?',opts:['A domain that uses HTTPS','A domain that looks similar to a legitimate one but is fake (e.g., micros0ft.com)','A domain registered overseas','A domain with no content'],ans:1,exp:'A spoofed domain is a fake domain designed to look like a real one — for example, micros0ft.com (with a zero) mimicking microsoft.com to trick users.'},
      {q:'What verification method is recommended when you receive a suspicious request from a known contact?',opts:['Reply to the email to confirm','Call the number provided in the suspicious message','Look up the contact\'s information from official records and contact them independently','Forward it to IT and take no further action'],ans:2,exp:'You should never use the contact info provided in the suspicious message. Instead, look up the person\'s number from official records (like your contract files) and contact them independently.'},
      {q:'What psychological principle did the attacker exploit when referencing the "Iloilo City" location in the smish?',opts:['Exclusivity','Scarcity','Fear and Urgency — a specific detail creates immediate panic','Authority'],ans:2,exp:'Mentioning a specific location (Iloilo City) created immediate Fear and Urgency — making the threat feel real and specific, pushing the employee to act without thinking.'},
      {q:'Social engineering primarily targets what, unlike traditional hacking?',opts:['Software vulnerabilities','Network firewalls','Human psychology','Database systems'],ans:2,exp:'Social engineering targets human psychology — manipulating people into giving up confidential information — rather than exploiting technical software vulnerabilities.'},
      {q:'What does MFA stand for?',opts:['Multiple File Access','Multi-Factor Authentication','Managed Firewall Application','Mobile Fraud Alert'],ans:1,exp:'MFA stands for Multi-Factor Authentication — a security process requiring two or more verification factors to gain access to an account.'},
      {q:'A shortened link (like bit.ly) in a text message is a red flag associated with which attack method?',opts:['Phishing (email)','Vishing (phone call)','Smishing (SMS)','Whaling'],ans:2,exp:'Shortened links (like bit.ly) are commonly used in Smishing because they hide the actual destination URL and are commonly used in SMS messages.'},
    ]
  },
  {
    id:'cybercrime',
    title:'Cybercrime Prevention Act & Data Privacy',
    desc:'RA 10175 and RA 10173 — Philippine cyber law',
    questions:[
      {q:'What is the full name of RA 10175?',opts:['The Electronic Commerce Act of 2000','The Cybercrime Prevention Act of 2012','The Data Privacy Act of 2012','The Anti-Hacking Law of 2012'],ans:1,exp:'RA 10175 is the Cybercrime Prevention Act of 2012, signed on September 12, 2012 by President Benigno S. Aquino III.'},
      {q:'Who signed RA 10175 into law?',opts:['President Gloria Macapagal-Arroyo','President Rodrigo Duterte','President Benigno S. Aquino III','President Ferdinand Marcos Jr.'],ans:2,exp:'RA 10175 was signed into law by President Benigno S. Aquino III on September 12, 2012.'},
      {q:'What was the primary reason RA 10175 was needed?',opts:['The Philippines had no internet laws at all','Prior laws like the E-Commerce Act of 2000 did not adequately cover modern cybercrimes like identity theft and hacking','The Philippines wanted to join an international cybercrime treaty','Cybercrime was already covered by the Revised Penal Code'],ans:1,exp:'Prior to 2012, the Philippines relied on outdated laws like the E-Commerce Act of 2000 that didn\'t adequately cover modern internet-based crimes, identity theft, or complex hacking.'},
      {q:'What is "Illegal Access" under RA 10175?',opts:['Sharing your password with a coworker','Accessing a whole or part of a computer system without right','Using someone else\'s internet connection','Downloading copyrighted files'],ans:1,exp:'Illegal Access is defined as accessing a whole or part of a computer system without right or authorization — essentially unauthorized hacking.'},
      {q:'What is "Illegal Interception" under RA 10175?',opts:['Recording a phone call with consent','Intercepting non-public transmissions of computer data (like emails or chats) without right','Reading public social media posts','Monitoring your own network traffic'],ans:1,exp:'Illegal Interception is the unauthorized interception of non-public data transmissions — similar to digital wiretapping of emails or chats.'},
      {q:'What is "Data Interference" under RA 10175?',opts:['Slow internet affecting data quality','Altering, damaging, deleting, or deteriorating computer data without authority, including spreading viruses','Interrupting someone\'s video call','Accessing data without permission'],ans:1,exp:'Data Interference covers altering, damaging, deleting, or deteriorating computer data without authority — including the spread of viruses and malware.'},
      {q:'What is "System Interference" under RA 10175?',opts:['A slow computer affecting productivity','Hindering or interrupting the functioning of a computer system by inputting, transmitting, or deleting data','Installing unapproved software','Accessing systems remotely'],ans:1,exp:'System Interference is hindering or interrupting a computer system\'s functioning — for example, a Distributed Denial of Service (DDoS) attack.'},
      {q:'What is "Cyber-squatting" under RA 10175?',opts:['Sitting in someone\'s online game session','Registering a domain name in bad faith to profit, mislead, or destroy the reputation of a brand','Creating a website similar in design to another','Using a celebrity\'s name as a username'],ans:1,exp:'Cyber-squatting is registering a domain name in bad faith to profit, mislead, or damage a brand — for example, registering googlephilippines.com to sell back to Google.'},
      {q:'What is "Computer-related Forgery"?',opts:['Printing fake documents using a computer printer','Inputting or altering computer data to create falsified documents for legal or financial deception','Copying someone\'s digital signature','Sending forged emails'],ans:1,exp:'Computer-related Forgery is inputting or altering data to create falsified digital documents intended for legal or financial deception.'},
      {q:'What is "Computer-related Fraud"?',opts:['Sending spam emails for profit','Altering data to cause economic loss to another while profiting oneself (e.g., unauthorized online bank transfers)','Creating fake e-commerce stores','Hacking a competitor\'s website'],ans:1,exp:'Computer-related Fraud involves altering computer data to cause economic loss to another while turning a profit for yourself — such as unauthorized online bank transfers.'},
      {q:'What is "Computer-related Identity Theft"?',opts:['Using someone\'s photo without permission on social media','The intentional acquisition or use of another person\'s identifying information (passwords, IDs, photos) without right','Creating a fake social media profile','Guessing someone\'s password'],ans:1,exp:'Computer-related Identity Theft is the intentional acquisition or use of another person\'s identifying tokens — passwords, IDs, or photos — without authorization.'},
      {q:'What is "Cyber Libel" under RA 10175?',opts:['Posting negative product reviews online','Defamation committed by, through, or with the use of a computer system','Sending anonymous messages online','Sharing someone\'s personal photo without consent'],ans:1,exp:'Cyber Libel is defamation or commercial libel committed through a computer system or similar means — essentially libel done online.'},
      {q:'Under the 2014 Supreme Court ruling (Disini v. Secretary of Justice), who can be prosecuted for Cyber Libel?',opts:['Anyone who Likes, Shares, or Comments on a defamatory post','Only the original author of the defamatory post','Both the author and those who share the post','Anyone who views the post'],ans:1,exp:'The Supreme Court ruled that ONLY the original author of a defamatory post can be prosecuted for Cyber Libel. Those who merely Like, Share, or Comment cannot be held liable.'},
      {q:'What is the standard penalty range for most cybercrimes under RA 10175?',opts:['Arresto mayor (1 month to 6 months)','Prision correccional (6 months to 6 years)','Prision mayor (6 years and 1 day to 12 years) and/or a fine of ₱200,000 up to the maximum damage caused','Reclusion perpetua (life imprisonment)'],ans:2,exp:'Most cybercrimes carry prision mayor (6 years and 1 day to 12 years imprisonment) and/or a fine ranging from ₱200,000 up to the maximum damage caused.'},
      {q:'What is the penalty if a cybercrime targets "Critical Infrastructure" like a power grid or hospital?',opts:['Standard penalty (prision mayor)','Double the standard fine only','Reclusion temporal — 12 years and 1 day to 20 years imprisonment','Life imprisonment (reclusion perpetua)'],ans:2,exp:'Targeting Critical Infrastructure (power grids, hospitals, military databases) escalates the penalty to reclusion temporal — 12 years and 1 day to 20 years.'},
      {q:'What does Section 6 of RA 10175 (the "One-Degree Higher Rule") state?',opts:['All cybercrime penalties are doubled','If any crime under the Revised Penal Code is committed using ICT, the penalty is raised one degree higher','Cybercrimes committed abroad are exempt from Philippine law','Repeat offenders receive one additional year per offense'],ans:1,exp:'Section 6 states that any crime under the Revised Penal Code (like Estafa or Threats) committed using ICT automatically carries a penalty one degree higher than the standard.'},
      {q:'Which government agencies are tasked with enforcing RA 10175?',opts:['DICT and DOJ','BIR and BSP','NBI and PNP','NPC and NICA'],ans:2,exp:'The National Bureau of Investigation (NBI) and the Philippine National Police (PNP) are the authorized agencies tasked with enforcing RA 10175.'},
      {q:'What courts handle cybercrime cases under RA 10175?',opts:['Regular Municipal Trial Courts','The Court of Appeals exclusively','Special Regional Trial Courts designated as Cybercrime Courts','The Sandiganbayan'],ans:2,exp:'The Supreme Court designated special Regional Trial Courts (RTCs) as "Special Cybercrime Courts" to handle cybercrime cases.'},
      {q:'For how long can law enforcement require service providers to preserve computer data under RA 10175?',opts:['30 days','3 months','6 months','1 year'],ans:2,exp:'Law enforcement can require service providers to preserve computer data for up to six months to assist in active cybercrime investigations.'},
      {q:'Can someone who knowingly aids or finances a cybercrime be held liable under RA 10175?',opts:['No — only the person who commits the act is liable','Yes — anyone who knowingly aids, abets, or finances a cybercrime can be held criminally liable','Only if they profit directly from the cybercrime','Only if they are an employee of the perpetrator'],ans:1,exp:'Yes. Under the Aiding or Abetting provision, anyone who knowingly aids, abets, or finances the commission of a cybercrime can be held criminally liable.'},
      {q:'What is the full name of RA 10173?',opts:['The Cybercrime Prevention Act of 2012','The Electronic Commerce Act of 2000','The Data Privacy Act of 2012','The Anti-Photo and Video Voyeurism Act'],ans:2,exp:'RA 10173 is the Data Privacy Act of 2012, signed on August 15, 2012.'},
      {q:'When was the Data Privacy Act (RA 10173) signed into law?',opts:['September 12, 2012','August 15, 2012','January 1, 2013','June 15, 2012'],ans:1,exp:'The Data Privacy Act was signed into law on August 15, 2012 — slightly earlier than RA 10175 which was signed on September 12, 2012.'},
      {q:'What are examples of "Personal Information (PI)" under RA 10173?',opts:['Medical records and SSS numbers','Full name, email address, home address, phone number','Political affiliation and religion','Attorney-client communications'],ans:1,exp:'Personal Information (PI) includes basic identifiable details like full name, email address, home address, and phone number.'},
      {q:'What is "Sensitive Personal Information (SPI)"?',opts:['Any information shared on social media','Data that is inherently private and could lead to discrimination or harm — such as health, race, religion, government IDs, and sexual life','Basic contact information','Publicly available information'],ans:1,exp:'SPI is inherently private data that could cause discrimination or harm if leaked — including health records, race, religion, sexual life, SSS numbers, and tax returns.'},
      {q:'What is "Privileged Information" under RA 10173?',opts:['Data owned by government officials','Information that cannot be disclosed in court due to a legal relationship (e.g., doctor-patient, attorney-client)','Data held by banks','Any encrypted data'],ans:1,exp:'Privileged Information is data that cannot be disclosed in court because of a legal relationship — such as doctor-patient, attorney-client, or spousal communications.'},
      {q:'What are the three fundamental data privacy principles under RA 10173?',opts:['Confidentiality, Integrity, Availability','Transparency, Legitimate Purpose, Proportionality','Consent, Security, Accountability','Privacy, Access, Control'],ans:1,exp:'The three fundamental principles are Transparency (inform the data subject), Legitimate Purpose (legal and specified reason), and Proportionality (collect only the minimum necessary data).'},
      {q:'What does the "Proportionality" principle in RA 10173 mean?',opts:['Data must be proportional to the company\'s size','Companies should only collect the minimum amount of data necessary for their stated purpose','All departments must handle data equally','Data retention must match data collection periods'],ans:1,exp:'Proportionality means collecting only the minimum data needed — if you can achieve your purpose with less data, do not ask for more (e.g., don\'t collect a full birthdate just to verify someone is over 18).'},
      {q:'What does the "Right to Object" give a data subject under RA 10173?',opts:['The right to sue the company immediately','The right to refuse the processing of their personal data (e.g., opting out of marketing emails)','The right to delete the company\'s entire database','The right to access competitor data'],ans:1,exp:'The Right to Object allows individuals to refuse or stop the processing of their personal data — such as opting out of receiving marketing emails.'},
      {q:'What does the "Right to Erasure or Blocking" allow a data subject to do?',opts:['Delete their social media accounts','Have their personal data suspended, withdrawn, or completely removed from a company\'s system','Block other users from contacting them','Erase their credit history'],ans:1,exp:'The Right to Erasure or Blocking allows a data subject to have their data suspended, withdrawn, or completely removed from an organization\'s systems.'},
      {q:'What is the "72-Hour Rule" in RA 10173?',opts:['Organizations have 72 hours to respond to data access requests','In the event of a data breach involving SPI, the organization must notify the NPC and affected data subjects within 72 hours of discovering the breach','Law enforcement has 72 hours to investigate a data breach before it expires','Users have 72 hours to opt out of data collection after signing up'],ans:1,exp:'The 72-Hour Rule requires that when a data breach involving Sensitive Personal Information occurs, the organization must notify both the National Privacy Commission and affected data subjects within 72 hours of discovery.'},
      {q:'What is the role of the National Privacy Commission (NPC)?',opts:['To investigate cybercrime alongside the NBI','An independent regulatory body that administers the DPA, investigates privacy violations, and handles complaints','To issue licenses to data processing companies','To encrypt government databases'],ans:1,exp:'The NPC is the independent regulatory body responsible for administering and implementing the Data Privacy Act, investigating violations, and handling complaints.'},
      {q:'What is a Data Protection Officer (DPO)?',opts:['A government regulator from the NPC','An individual designated by an organization to ensure compliance with the DPA','A police officer specializing in data theft','A certified ethical hacker'],ans:1,exp:'A DPO is an individual designated within an organization (school, bank, hospital) who is specifically responsible for ensuring the organization complies with the Data Privacy Act.'},

let currentModule=0, currentQ=0, answered=false;
let scores={};
MODULES.forEach(m=>scores[m.id]={correct:0,total:0,done:false});
let shuffledQs=[];

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startModule(idx){currentModule=idx;currentQ=0;answered=false;shuffledQs=shuffle(MODULES[idx].questions);scores[MODULES[idx].id]={correct:0,total:0,done:false};render();}

function render(){
  const app=document.getElementById('app');
  const mod=MODULES[currentModule];
  const qs=shuffledQs;
  const isDone=currentQ>=qs.length;
  let tabsHTML=MODULES.map((m,i)=>{const s=scores[m.id];const pct=s.total>0?Math.round(s.correct/s.total*100)+'%':'';return`<button class="tab${i===currentModule?' active':''}" onclick="startModule(${i})">${m.title}${s.done?' ('+pct+')':''}</button>`;}).join('');
  if(isDone){
    scores[mod.id].done=true;
    const s=scores[mod.id];
    const pct=Math.round(s.correct/s.total*100);
    const allDone=MODULES.every(m=>scores[m.id].done);
    let tc=0,tq=0;MODULES.forEach(m=>{tc+=scores[m.id].correct;tq+=scores[m.id].total;});
    const tp=tq>0?Math.round(tc/tq*100):0;
    app.innerHTML=`<div class="header"><h2>IT108 Cybersecurity Quiz</h2><p>3 modules • 30+ questions each</p></div><div class="tabs">${tabsHTML}</div><div class="quiz-card"><div class="score-card"><div class="score-big">${pct}%</div><div class="score-label">${mod.title}</div><div class="score-grid"><div class="score-metric"><div class="num">${s.correct}</div><div class="lbl">Correct</div></div><div class="score-metric"><div class="num">${s.total-s.correct}</div><div class="lbl">Wrong</div></div><div class="score-metric"><div class="num">${s.total}</div><div class="lbl">Total</div></div></div>${allDone?`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:1.25rem;font-size:14px;color:var(--color-text-secondary)">All modules done! Overall: <strong style="color:var(--color-text-primary)">${tp}%</strong> (${tc}/${tq})</div>`:''}<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn primary" onclick="startModule(${currentModule})">Retake this module</button>${currentModule<MODULES.length-1?`<button class="btn" onclick="startModule(${currentModule+1})">Next module →</button>`:''}</div></div></div>`;
    return;
  }
  const q=qs[currentQ];
  const progress=Math.round((currentQ/qs.length)*100);
  app.innerHTML=`<div class="header"><h2>IT108 Cybersecurity Quiz</h2><p>3 modules • 30+ questions each</p></div><div class="tabs">${tabsHTML}</div><div class="quiz-card"><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><div class="q-meta">${mod.title} — Question ${currentQ+1} of ${qs.length}</div><div class="q-text">${q.q}</div><div class="options">${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}</div><div id="fb"></div><div class="nav"><span style="font-size:13px;color:var(--color-text-tertiary)">${scores[mod.id].correct} correct so far</span><button class="btn primary" id="nextbtn" style="display:none" onclick="next()">Next question →</button></div></div>`;
}

function answer(idx){
  if(answered)return;
  answered=true;
  const mod=MODULES[currentModule];
  const q=shuffledQs[currentQ];
  const isCorrect=idx===q.ans;
  scores[mod.id].total++;
  if(isCorrect)scores[mod.id].correct++;
  q.opts.forEach((_,i)=>{const btn=document.getElementById('opt'+i);btn.disabled=true;if(i===q.ans)btn.classList.add('correct');else if(i===idx&&!isCorrect)btn.classList.add('wrong');});
  document.getElementById('fb').innerHTML=`<div class="feedback ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ Correct! ':'✗ Incorrect. '}${q.exp}</div>`;
  document.getElementById('nextbtn').style.display='block';
}

function next(){currentQ++;answered=false;render();}
render();
</script>
